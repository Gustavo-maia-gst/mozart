# Mozart metrics backend. The master PUSHES OTLP metrics here (see docker-compose
# --web.enable-otlp-receiver); there is no scrape target for the app.
global:
  scrape_interval: 15s

otlp:
  # Fold the run's grouping dimensions (resource attributes) into per-series
  # labels so PromQL can group/filter by them — this is what powers
  # "under comms mean Y / storage mean Z, compare protocols". Attribute keys are
  # the dotted OTLP names; Prometheus sanitizes them to underscored label names
  # (mozart.protocol -> mozart_protocol, mozart.latency.transport_deliver.mean ->
  # mozart_latency_transport_deliver_mean).
  promote_resource_attributes:
    - mozart.protocol
    - mozart.run_id
    - mozart.scenario
    - mozart.seed
    - mozart.latency.transport_deliver.mean
    - mozart.latency.transport_deliver.stddev
    - mozart.latency.storage_read.mean
    - mozart.latency.storage_read.stddev
    - mozart.latency.storage_save.mean
    - mozart.latency.storage_save.stddev
    - mozart.latency.storage_find.mean
    - mozart.latency.storage_readExclusive.mean
    - mozart.latency.worker_taskDuration.mean
  # Underscore-escape dotted names and keep the unit/type suffixes (the default).
  translation_strategy: UnderscoreEscapingWithSuffixes

storage:
  tsdb:
    # A short run's final flush can arrive with a timestamp slightly behind
    # Prometheus's clock; without this window the last (most important) sample
    # would be dropped.
    out_of_order_time_window: 30m

# Optional: let Prometheus scrape its own metrics (handy for debugging ingestion).
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
