apiVersion: 1

providers:
  - name: mozart
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      # Dashboards as code: drop a *.json here and it auto-loads. Folder structure
      # on disk becomes Grafana folders.
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
