# Smoke-test scenario: 2 echo nodes, a kill+restart fault, small latencies.
name: echo-smoke
seed: 42
protocol: echo
nodes:
  - { id: n1 }
  - { id: n2 }
dag:
  tasks:
    - { id: t1 }
    - { id: t2, dependsOn: [t1] }
storage:
  adapter: in-memory
transport:
  ackTimeoutMs: 2000
latency:
  transport.deliver: { distribution: normal, mean: 30, stddev: 10 }
  storage.read: { distribution: normal, mean: 5, stddev: 2 }
  storage.readExclusive: { distribution: normal, mean: 8, stddev: 3 }
  storage.save: { distribution: normal, mean: 6, stddev: 2 }
  worker.taskDuration: { distribution: lognormal, mu: 6.9, sigma: 0.5 } # ~1s median
faults:
  - { action: killNode, at: 3000, node: n2, restartAfterMs: 2000 }
endCondition:
  type: timeout
  ms: 15000
