# Demo scenario: echo protocol with a kill+restart fault that forces a
# redelivery to the downed node, which is observed once it recovers.
name: echo-chaos
seed: 42
protocol: echo
nodes: [{ id: n1 }, { id: n2 }]
dag:
  tasks: [{ id: t1, costMs: 40 }, { id: t2, dependsOn: [t1], costMs: 40 }]
storage: { adapter: in-memory }
transport: { ackTimeoutMs: 120 }
latency:
  transport.deliver: { distribution: constant, value: 100 }
  storage.read: { distribution: constant, value: 5 }
  storage.readExclusive: { distribution: constant, value: 5 }
  storage.save: { distribution: constant, value: 5 }
faults:
  - { action: killNode, at: 40, node: n2, restartAfterMs: 250 }
endCondition: { type: timeout, ms: 1600 }
